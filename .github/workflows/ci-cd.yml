name: ci-cd

on:
  pull_request:
    branches:
      - main
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.25.0"

      - name: Run Go tests
        run: go test ./...

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Install web dependencies
        working-directory: web
        run: npm ci

      - name: Lint web
        working-directory: web
        run: npm run lint

      - name: Build web
        working-directory: web
        run: npm run build

  build_and_push:
    if: github.event_name != 'pull_request'
    needs: validate
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - service: web
            dockerfile: infra/development/docker/web.Dockerfile
          - service: api-gateway
            dockerfile: infra/development/docker/api-gateway.Dockerfile
          - service: chat-agent
            dockerfile: infra/development/docker/chat-agent.Dockerfile
          - service: detail-extracter-agent
            dockerfile: infra/development/docker/detail-extracter-agent.Dockerfile
          - service: predictive-analytics-agent
            dockerfile: infra/development/docker/predictive-analytics-agent.Dockerfile
          - service: passenger-service
            dockerfile: infra/development/docker/passenger-service.Dockerfile
          - service: passenger-match-worker
            dockerfile: infra/development/docker/passenger-match-worker.Dockerfile
          - service: staff-service
            dockerfile: infra/development/docker/staff-service.Dockerfile
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Normalize registry owner
        id: owner
        run: echo "value=${GITHUB_REPOSITORY_OWNER,,}" >> "$GITHUB_OUTPUT"

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute image tags
        id: image
        env:
          OWNER_LC: ${{ steps.owner.outputs.value }}
        run: |
          image="ghcr.io/${OWNER_LC}/smartfind/${{ matrix.service }}"
          {
            echo "repository=${image}"
            echo "tags<<EOF"
            echo "${image}:${GITHUB_SHA}"
            if [[ "${GITHUB_REF}" == "refs/heads/main" ]]; then
              echo "${image}:latest"
            fi
            if [[ "${GITHUB_REF}" == refs/tags/* ]]; then
              echo "${image}:${GITHUB_REF_NAME}"
            fi
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          push: true
          tags: ${{ steps.image.outputs.tags }}

  deploy_production:
    if: |
      (github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')) ||
      github.event_name == 'workflow_dispatch'
    needs: build_and_push
    runs-on: ubuntu-latest
    environment: production
    env:
      KUBE_CONFIG_DATA: ${{ secrets.KUBE_CONFIG_DATA }}
      K8S_NAMESPACE: ${{ vars.K8S_NAMESPACE }}
      DIGITALOCEAN_ACCESS_TOKEN: ${{ secrets.DIGITALOCEAN_ACCESS_TOKEN }}
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up kubectl
        uses: azure/setup-kubectl@v4
        with:
          version: latest

      - name: Set up doctl (DigitalOcean auth plugin)
        uses: digitalocean/action-doctl@v2
        with:
          token: ${{ env.DIGITALOCEAN_ACCESS_TOKEN }}

      - name: Normalize registry owner
        id: owner
        run: echo "value=${GITHUB_REPOSITORY_OWNER,,}" >> "$GITHUB_OUTPUT"

      - name: Configure kubeconfig
        run: |
          mkdir -p "$HOME/.kube"
          echo "${KUBE_CONFIG_DATA}" | base64 --decode > "$HOME/.kube/config"
          kubectl config current-context

      - name: Deploy production
        env:
          REGISTRY_PREFIX: ghcr.io/${{ steps.owner.outputs.value }}/smartfind
        run: |
          namespace="${K8S_NAMESPACE:-smartfind-production}"
          scripts/deploy/apply.sh \
            --environment production \
            --namespace "${namespace}" \
            --registry "${REGISTRY_PREFIX}" \
            --image-tag "${GITHUB_SHA}"
