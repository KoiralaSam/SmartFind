apiVersion: apps/v1
kind: Deployment
metadata:
  name: web
  labels:
    app: web
spec:
  replicas: 1
  selector:
    matchLabels:
      app: web
  template:
    metadata:
      labels:
        app: web
    spec:
      containers:
        - name: web
          image: smartfind/web
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 5173
              name: http
          resources:
            requests:
              cpu: "100m"
              memory: "256Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
          env:
            - name: NODE_ENV
              value: "development"
            - name: VITE_API_BASE_URL
              value: "http://smartfind-api:8081"
            - name: CHAT_AGENT_URL
              value: "http://chat-agent:8090"
            - name: DETAIL_EXTRACTER_URL
              value: "http://detail-extracter-agent:8091"
            # Google OAuth client ID for passenger sign-in (Vite injects at dev server start)
            - name: VITE_GOOGLE_CLIENT_ID
              valueFrom:
                secretKeyRef:
                  name: passenger-service-secrets
                  key: GOOGLE_CLIENT_ID
          readinessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 10
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 60
            periodSeconds: 20
            timeoutSeconds: 10
            failureThreshold: 3
