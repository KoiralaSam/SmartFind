apiVersion: v1
kind: ConfigMap
metadata:
  name: app-config
data:
  ENVIRONMENT: "development"
  GATEWAY_HTTP_ADDR: ":8081"
  # Passenger-service gRPC server listen address (binds inside the container)
  PASSENGER_GRPC_ADDR: ":50051"
  # API Gateway -> passenger-service gRPC address (cluster DNS name + port)
  PASSENGER_SERVICE_ADDRESS: "passenger-service:50051"
  # API Gateway -> staff-service gRPC address (cluster DNS name + port)
  STAFF_SERVICE_ADDRESS: "staff-service:50052"
  # API Gateway -> detail-extracter-agent gRPC address (cluster DNS name + port)
  DETAIL_EXTRACTER_SERVICE_ADDRESS: "detail-extracter-agent:50053"
  # Minimum cosine similarity (0..1) for a found-item to be returned as a
  # match for a lost report. Applies to both the on-demand check-my-item
  # path and the passenger-match-worker CronJob. 0.65 is calibrated for
  # noisy real-world passenger/staff descriptions; raise for precision.
  MATCH_MIN_SIMILARITY: "0.65"
