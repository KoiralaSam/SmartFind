apiVersion: apps/v1
kind: Deployment
metadata:
  name: detail-extracter-agent
  labels:
    app: detail-extracter-agent
spec:
  replicas: 1
  selector:
    matchLabels:
      app: detail-extracter-agent
  template:
    metadata:
      labels:
        app: detail-extracter-agent
    spec:
      containers:
        - name: detail-extracter-agent
          image: smartfind/detail-extracter-agent
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8091
              name: http
          env:
            - name: ENVIRONMENT
              valueFrom:
                configMapKeyRef:
                  name: app-config
                  key: ENVIRONMENT
            - name: GROQ_API_KEY
              valueFrom:
                secretKeyRef:
                  name: groq-api-key
                  key: GROQ_API_KEY
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 30
            periodSeconds: 20
---
apiVersion: v1
kind: Service
metadata:
  name: detail-extracter-agent
  labels:
    app: detail-extracter-agent
spec:
  selector:
    app: detail-extracter-agent
  ports:
    - name: http
      port: 8091
      targetPort: http
