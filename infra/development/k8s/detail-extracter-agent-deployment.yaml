apiVersion: apps/v1
kind: Deployment
metadata:
  name: detail-extracter-agent
  labels:
    app: detail-extracter-agent
spec:
  replicas: 1
  selector:
    matchLabels:
      app: detail-extracter-agent
  template:
    metadata:
      labels:
        app: detail-extracter-agent
    spec:
      containers:
        - name: detail-extracter-agent
          image: smartfind/detail-extracter-agent
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8091
              name: http
            - containerPort: 50053
              name: grpc
          env:
            - name: ENVIRONMENT
              valueFrom:
                configMapKeyRef:
                  name: app-config
                  key: ENVIRONMENT
            - name: GOOGLE_SERVICE_ACCOUNT_JSON
              valueFrom:
                secretKeyRef:
                  name: detail-extracter-agent
                  key: GOOGLE_SERVICE_ACCOUNT_JSON
            - name: INTERNAL_SERVICE_SECRET
              valueFrom:
                secretKeyRef:
                  name: internal-service-secret
                  key: INTERNAL_SERVICE_SECRET
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 30
            periodSeconds: 20
---
apiVersion: v1
kind: Service
metadata:
  name: detail-extracter-agent
  labels:
    app: detail-extracter-agent
spec:
  selector:
    app: detail-extracter-agent
  ports:
    - name: http
      port: 8091
      targetPort: http
    - name: grpc
      port: 50053
      targetPort: grpc
