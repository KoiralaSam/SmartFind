apiVersion: apps/v1
kind: Deployment
metadata:
  name: passenger-service
  labels:
    app: passenger-service
spec:
  replicas: 1
  selector:
    matchLabels:
      app: passenger-service
  template:
    metadata:
      labels:
        app: passenger-service
    spec:
      containers:
        - name: passenger-service
          image: smartfind/passenger-service
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 50051
              name: grpc
          env:
            - name: PASSENGER_GRPC_ADDR
              valueFrom:
                configMapKeyRef:
                  name: app-config
                  key: PASSENGER_GRPC_ADDR
            - name: STAFF_SERVICE_ADDRESS
              valueFrom:
                configMapKeyRef:
                  name: app-config
                  key: STAFF_SERVICE_ADDRESS
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: postgres-secret
                  key: DATABASE_URL_CLUSTER
            - name: GOOGLE_CLIENT_ID
              valueFrom:
                secretKeyRef:
                  name: passenger-service-secrets
                  key: GOOGLE_CLIENT_ID
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: passenger-service-secrets
                  key: JWT_SECRET
            - name: JWT_TTL_SECONDS
              valueFrom:
                secretKeyRef:
                  name: passenger-service-secrets
                  key: JWT_TTL_SECONDS
            - name: INTERNAL_SERVICE_SECRET
              valueFrom:
                secretKeyRef:
                  name: internal-service-secret
                  key: INTERNAL_SERVICE_SECRET
            - name: MATCH_MIN_SIMILARITY
              valueFrom:
                secretKeyRef:
                  name: sendgrid-secrets
                  key: MATCH_MIN_SIMILARITY
            - name: OPENAI_API_KEY
              valueFrom:
                secretKeyRef:
                  name: openai-api-key
                  key: OPENAI_API_KEY
          readinessProbe:
            tcpSocket:
              port: grpc
            initialDelaySeconds: 5
            periodSeconds: 5
          livenessProbe:
            tcpSocket:
              port: grpc
            initialDelaySeconds: 10
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: passenger-service
  labels:
    app: passenger-service
spec:
  selector:
    app: passenger-service
  ports:
    - name: grpc
      port: 50051
      targetPort: grpc
  type: ClusterIP
