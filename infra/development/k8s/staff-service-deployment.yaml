apiVersion: apps/v1
kind: Deployment
metadata:
  name: staff-service
  labels:
    app: staff-service
spec:
  replicas: 1
  selector:
    matchLabels:
      app: staff-service
  template:
    metadata:
      labels:
        app: staff-service
    spec:
      containers:
        - name: staff-service
          image: smartfind/staff-service
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 50052
              name: grpc
          env:
            - name: STAFF_GRPC_ADDR
              value: ":50052"
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: postgres-secret
                  key: DATABASE_URL_CLUSTER
            - name: OPENAI_API_KEY
              valueFrom:
                secretKeyRef:
                  name: openai-api-key
                  key: OPENAI_API_KEY
          readinessProbe:
            tcpSocket:
              port: grpc
            initialDelaySeconds: 5
            periodSeconds: 5
          livenessProbe:
            tcpSocket:
              port: grpc
            initialDelaySeconds: 10
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: staff-service
  labels:
    app: staff-service
spec:
  selector:
    app: staff-service
  ports:
    - name: grpc
      port: 50052
      targetPort: grpc
  type: ClusterIP

