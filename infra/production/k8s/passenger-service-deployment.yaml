apiVersion: apps/v1
kind: Deployment
metadata:
  name: passenger-service
  labels:
    app: passenger-service
spec:
  replicas: 1
  selector:
    matchLabels:
      app: passenger-service
  template:
    metadata:
      labels:
        app: passenger-service
    spec:
      containers:
        - name: passenger-service
          image: ghcr.io/koiralasam/smartfind/passenger-service:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 50051
              name: grpc
          env:
            - name: PASSENGER_GRPC_ADDR
              valueFrom:
                configMapKeyRef:
                  name: app-config
                  key: PASSENGER_GRPC_ADDR
            - name: STAFF_SERVICE_ADDRESS
              valueFrom:
                configMapKeyRef:
                  name: app-config
                  key: STAFF_SERVICE_ADDRESS
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: postgres-secret
                  key: DATABASE_URL_CLUSTER
            - name: GOOGLE_CLIENT_ID
              valueFrom:
                secretKeyRef:
                  name: passenger-service-secrets
                  key: GOOGLE_CLIENT_ID
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: passenger-service-secrets
                  key: JWT_SECRET
            - name: JWT_TTL_SECONDS
              valueFrom:
                secretKeyRef:
                  name: passenger-service-secrets
                  key: JWT_TTL_SECONDS
            - name: INTERNAL_SERVICE_SECRET
              valueFrom:
                secretKeyRef:
                  name: internal-service-secret
                  key: INTERNAL_SERVICE_SECRET
            - name: MATCH_MIN_SIMILARITY
              valueFrom:
                configMapKeyRef:
                  name: app-config
                  key: MATCH_MIN_SIMILARITY
            - name: OPENAI_API_KEY
              valueFrom:
                secretKeyRef:
                  name: openai-api-key
                  key: OPENAI_API_KEY
            - name: AWS_ACCESS_KEY_ID
              valueFrom:
                secretKeyRef:
                  name: s3-credentials
                  key: AWS_ACCESS_KEY_ID
            - name: AWS_SECRET_ACCESS_KEY
              valueFrom:
                secretKeyRef:
                  name: s3-credentials
                  key: AWS_SECRET_ACCESS_KEY
            - name: AWS_SESSION_TOKEN
              valueFrom:
                secretKeyRef:
                  name: s3-credentials
                  key: AWS_SESSION_TOKEN
            - name: AWS_REGION
              valueFrom:
                secretKeyRef:
                  name: s3-credentials
                  key: AWS_REGION
            - name: AWS_S3_BUCKET
              valueFrom:
                secretKeyRef:
                  name: s3-credentials
                  key: AWS_S3_BUCKET
            - name: AWS_S3_PREFIX
              valueFrom:
                secretKeyRef:
                  name: s3-credentials
                  key: AWS_S3_PREFIX
            - name: AWS_S3_ENDPOINT
              valueFrom:
                secretKeyRef:
                  name: s3-credentials
                  key: AWS_S3_ENDPOINT
            - name: AWS_S3_FORCE_PATH_STYLE
              valueFrom:
                secretKeyRef:
                  name: s3-credentials
                  key: AWS_S3_FORCE_PATH_STYLE
            - name: AWS_S3_PRESIGN_GET_TTL_SECONDS
              valueFrom:
                secretKeyRef:
                  name: s3-credentials
                  key: AWS_S3_PRESIGN_GET_TTL_SECONDS
            - name: MATCH_EMAIL_IMAGE_TTL_SECONDS
              value: "604800"
            - name: MAILTRAP_API_TOKEN
              valueFrom:
                secretKeyRef:
                  name: mailtrap-secrets
                  key: MAILTRAP_API_TOKEN
            - name: MAILTRAP_FROM_EMAIL
              valueFrom:
                secretKeyRef:
                  name: mailtrap-secrets
                  key: MAILTRAP_FROM_EMAIL
            - name: MAILTRAP_FROM_NAME
              valueFrom:
                secretKeyRef:
                  name: mailtrap-secrets
                  key: MAILTRAP_FROM_NAME
                  optional: true
            - name: PUBLIC_APP_BASE_URL
              valueFrom:
                secretKeyRef:
                  name: mailtrap-secrets
                  key: PUBLIC_APP_BASE_URL
            - name: MATCH_MAX_NOTIFS_PER_REPORT_PER_DAY
              valueFrom:
                secretKeyRef:
                  name: mailtrap-secrets
                  key: MATCH_MAX_NOTIFS_PER_REPORT_PER_DAY
            - name: MATCH_MAX_NOTIFS_PER_PASSENGER_PER_DAY
              valueFrom:
                secretKeyRef:
                  name: mailtrap-secrets
                  key: MATCH_MAX_NOTIFS_PER_PASSENGER_PER_DAY
            - name: MATCH_EMAIL_COOLDOWN_MINUTES
              valueFrom:
                secretKeyRef:
                  name: mailtrap-secrets
                  key: MATCH_EMAIL_COOLDOWN_MINUTES
            - name: MATCH_EMAIL_MAX_ITEMS
              valueFrom:
                secretKeyRef:
                  name: mailtrap-secrets
                  key: MATCH_EMAIL_MAX_ITEMS
          readinessProbe:
            tcpSocket:
              port: grpc
            initialDelaySeconds: 5
            periodSeconds: 5
          livenessProbe:
            tcpSocket:
              port: grpc
            initialDelaySeconds: 10
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: passenger-service
  labels:
    app: passenger-service
spec:
  selector:
    app: passenger-service
  ports:
    - name: grpc
      port: 50051
      targetPort: grpc
  type: ClusterIP
