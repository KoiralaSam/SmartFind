apiVersion: apps/v1
kind: Deployment
metadata:
  name: web
  labels:
    app: web
spec:
  replicas: 1
  selector:
    matchLabels:
      app: web
  template:
    metadata:
      labels:
        app: web
    spec:
      containers:
        - name: web
          image: ghcr.io/koiralasam/smartfind/web:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 5173
              name: http
          resources:
            requests:
              cpu: "100m"
              memory: "256Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
          env:
            - name: NODE_ENV
              value: "production"
            - name: VITE_API_BASE_URL
              valueFrom:
                configMapKeyRef:
                  name: app-config
                  key: PUBLIC_API_BASE_URL
            - name: CHAT_AGENT_URL
              valueFrom:
                configMapKeyRef:
                  name: app-config
                  key: PUBLIC_CHAT_AGENT_URL
            - name: DETAIL_EXTRACTER_URL
              valueFrom:
                configMapKeyRef:
                  name: app-config
                  key: PUBLIC_DETAIL_EXTRACTER_URL
            - name: ANALYTICS_URL
              valueFrom:
                configMapKeyRef:
                  name: app-config
                  key: ANALYTICS_URL
            - name: VITE_GOOGLE_CLIENT_ID
              valueFrom:
                secretKeyRef:
                  name: passenger-service-secrets
                  key: GOOGLE_CLIENT_ID
          readinessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 10
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 60
            periodSeconds: 20
            timeoutSeconds: 10
            failureThreshold: 3
---
apiVersion: v1
kind: Service
metadata:
  name: web
  labels:
    app: web
  annotations:
    service.beta.kubernetes.io/do-loadbalancer-type: "REGIONAL"
    service.beta.kubernetes.io/do-loadbalancer-certificate-name: "smartfind-samarpankoirala-tech-root"
    service.beta.kubernetes.io/do-loadbalancer-http-ports: "80"
    service.beta.kubernetes.io/do-loadbalancer-tls-ports: "443"
    service.beta.kubernetes.io/do-loadbalancer-redirect-http-to-https: "true"
    service.beta.kubernetes.io/do-loadbalancer-hostname: "smartfind.samarpankoirala.tech"
spec:
  type: LoadBalancer
  ports:
    - port: 80
      name: http
      targetPort: http
    - port: 443
      name: https
      targetPort: http
  selector:
    app: web
