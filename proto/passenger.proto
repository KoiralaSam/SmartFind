syntax = "proto3";

package smartfind.passenger.v1;

option go_package = "smartfind/proto;smartfindpb";

import "google/protobuf/empty.proto";
import "google/protobuf/timestamp.proto";

service PassengerService {
  rpc Login(LoginRequest) returns (LoginResponse);
  rpc CreateLostReport(CreateLostReportRequest) returns (LostReport);
  rpc ListLostReports(ListLostReportsRequest) returns (ListLostReportsResponse);
  rpc DeleteLostReport(DeleteLostReportRequest) returns (google.protobuf.Empty);
  rpc SearchFoundItemMatches(SearchFoundItemMatchesRequest) returns (SearchFoundItemMatchesResponse);
  rpc FileClaim(FileClaimRequest) returns (ItemClaim);
  rpc ListMyClaims(ListMyClaimsRequest) returns (ListMyClaimsResponse);
  rpc ListNotifications(ListNotificationsRequest) returns (ListNotificationsResponse);
  rpc MarkNotificationRead(MarkNotificationReadRequest) returns (google.protobuf.Empty);
}

message Passenger {
  string id = 1;
  string email = 2;
  string full_name = 3;
  string phone = 4;
  google.protobuf.Timestamp created_at = 5;
  google.protobuf.Timestamp updated_at = 6;
  string avatar_url = 7;
}

message LoginRequest {
  string id_token = 1;
}

message LoginResponse {
  Passenger passenger = 1;
  string session_token = 2;
}

message LostReport {
  string id = 1;
  string reporter_passenger_id = 2;
  string item_name = 3;
  string item_description = 4;
  string item_type = 5;
  string brand = 6;
  string model = 7;
  string color = 8;
  string material = 9;
  string item_condition = 10;
  string category = 11;
  string location_lost = 12;
  string route_or_station = 13;
  string route_id = 14;
  google.protobuf.Timestamp date_lost = 15;
  string status = 16;
  google.protobuf.Timestamp created_at = 17;
  google.protobuf.Timestamp updated_at = 18;
}

message CreateLostReportRequest {
  string passenger_id = 1;
  string item_name = 2;
  string item_description = 3;
  string item_type = 4;
  string brand = 5;
  string model = 6;
  string color = 7;
  string material = 8;
  string item_condition = 9;
  string category = 10;
  string location_lost = 11;
  string route_or_station = 12;
  string route_id = 13;
  google.protobuf.Timestamp date_lost = 14;
}

message ListLostReportsRequest {
  string passenger_id = 1;
  string status = 2;
}

message ListLostReportsResponse {
  repeated LostReport reports = 1;
}

message DeleteLostReportRequest {
  string passenger_id = 1;
  string lost_report_id = 2;
}

message FoundItemMatch {
  string found_item_id = 1;
  string item_name = 2;
  string item_description = 3;
  string item_type = 4;
  string brand = 5;
  string model = 6;
  string color = 7;
  string material = 8;
  string item_condition = 9;
  string category = 10;
  string location_found = 11;
  string route_or_station = 12;
  string route_id = 13;
  google.protobuf.Timestamp date_found = 14;
  string status = 15;
  double similarity_score = 16;
  repeated string image_urls = 17;
  string primary_image_url = 18;
}

message SearchFoundItemMatchesRequest {
  string passenger_id = 1;
  string lost_report_id = 2;
  int32 limit = 3;
}

message SearchFoundItemMatchesResponse {
  repeated FoundItemMatch matches = 1;
}

message FileClaimRequest {
  string passenger_id = 1;
  string found_item_id = 2;
  string lost_report_id = 3;
  string message = 4;
}

message ItemClaim {
  string id = 1;
  string item_id = 2;
  string claimant_passenger_id = 3;
  string lost_report_id = 4;
  string message = 5;
  string status = 6;
  google.protobuf.Timestamp created_at = 7;
  google.protobuf.Timestamp updated_at = 8;
}

message ListMyClaimsRequest {
  string status = 1;
  int32 limit = 2;
  int32 offset = 3;
}

message ListMyClaimsResponse {
  repeated ItemClaim claims = 1;
}

message PassengerMatchNotification {
  string id = 1;
  string passenger_id = 2;
  string lost_report_id = 3;
  string found_item_id = 4;
  double similarity_score = 5;
  string item_name = 6;
  repeated string image_urls = 7;
  string primary_image_url = 8;
  google.protobuf.Timestamp created_at = 9;
  google.protobuf.Timestamp read_at = 10;
}

message ListNotificationsRequest {
  int32 limit = 1;
  bool unread_only = 2;
  google.protobuf.Timestamp created_before = 3;
}

message ListNotificationsResponse {
  repeated PassengerMatchNotification notifications = 1;
}

message MarkNotificationReadRequest {
  repeated string notification_ids = 1;
}
