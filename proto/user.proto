syntax = "proto3";

package smartfind.user.v1;

option go_package = "ride-sharing/proto;smartfindpb";

import "google/protobuf/empty.proto";
import "google/protobuf/timestamp.proto";

service UserService {
  rpc CreateUser(CreateUserRequest) returns (User);
  rpc GetUser(GetUserRequest) returns (User);
  rpc UpdateUser(UpdateUserRequest) returns (User);
  rpc DeleteUser(DeleteUserRequest) returns (google.protobuf.Empty);
}

// Mirrors the users table from the initial schema migration.
message User {
  string id = 1;
  string email = 2;
  string full_name = 3;
  optional string phone = 4;
  google.protobuf.Timestamp created_at = 5;
  google.protobuf.Timestamp updated_at = 6;
}

// Required by the users table: id, email, and full_name.
message CreateUserRequest {
  string id = 1;
  string email = 2;
  string full_name = 3;
  optional string phone = 4;
}

message GetUserRequest {
  string id = 1;
}

// Update keeps id required and allows mutable user fields to be supplied.
message UpdateUserRequest {
  string id = 1;
  optional string email = 2;
  optional string full_name = 3;
  optional string phone = 4;
}

message DeleteUserRequest {
  string id = 1;
}
